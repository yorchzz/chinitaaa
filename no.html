<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ups </title>



<style>


*{

margin:0;

padding:0;

box-sizing:border-box;

}



body{


height:100vh;


overflow:hidden;


display:flex;


justify-content:center;


align-items:center;


font-family:'Poppins',sans-serif;



background:


linear-gradient(

135deg,

#18002d,

#8500c8,

#ff75d5

);



color:white;


text-align:center;


}




.container{


animation:

entrada 1s ease;


}




.heart{


font-size:100px;


animation:

latido 1s infinite;


filter:

drop-shadow(

0 0 25px pink

);


}





h1{


font-size:3rem;


margin-top:20px;



text-shadow:


0 0 20px white,


0 0 40px pink;


}





p{


font-size:1.5rem;


margin-top:20px;


}





.timer{


margin-top:25px;


font-size:22px;


color:#ffe1ff;


}





@keyframes entrada{


from{


opacity:0;


transform:scale(.3);


}


to{


opacity:1;


transform:scale(1);


}


}




@keyframes latido{


50%{


transform:scale(1.2);


}


}



</style>


</head>



<body>



<div class="container">


<div class="heart">



</div>


<h1>

Tienes que tocar la opción Sí 🫰🏼

</h1>



<p>

Esa era la opción correcta 🍣

</p>



<div class="timer">

Regresando en <span id="segundos">5</span> segundos...

</div>



</div>







<script>


let tiempo = 5;


let contador = 
document.getElementById("segundos");



let intervalo = setInterval(()=>{


tiempo--;


contador.innerHTML = tiempo;



if(tiempo <= 0){


clearInterval(intervalo);



window.location.href="index.html";


}



},1000);



</script>



</body>


</html>
